name: Build Windows EXE and Release

# version.txt が更新されたときだけ自動ビルド＆リリース
on:
  push:
    paths:
      - 'version.txt'
    branches:
      - main

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyinstaller python-docx openpyxl python-pptx pdfplumber tkinterdnd2

      - name: Build EXE (CI spec)
        run: pyinstaller build_ci.spec

      - name: Get version from version.txt
        id: ver
        run: |
          $v = (Get-Content version.txt -Raw).Trim()
          echo "version=$v" >> $env:GITHUB_OUTPUT
        shell: pwsh

      - name: Create GitHub Release and upload EXE
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: "v${{ steps.ver.outputs.version }}"
          body: |
            楽々JC v${{ steps.ver.outputs.version }}

            **Windows ユーザーの方へ**
            アプリが自動でこのバージョンにアップデートされます。
            アプリを起動して「はい」を押してください。
          files: dist/rakuraku_jc.exe
          make_latest: true
