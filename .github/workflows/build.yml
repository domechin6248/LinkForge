name: Build RakurakuJC

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install pyinstaller python-docx tkinterdnd2
      - run: pyinstaller 楽々JC.spec --noconfirm
      - run: cd dist && zip -r RakurakuJC_Mac.zip 楽々JC.app
      - uses: actions/upload-artifact@v4
        with:
          name: RakurakuJC_Mac
          path: dist/RakurakuJC_Mac.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install pyinstaller python-docx tkinterdnd2
      - run: pyinstaller rakuraku_jc.py --noconfirm --onefile --windowed --name RakurakuJC
      - uses: actions/upload-artifact@v4
        with:
          name: RakurakuJC_Windows
          path: dist/RakurakuJC.exe
